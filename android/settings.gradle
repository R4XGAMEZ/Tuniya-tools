pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropertiesFile = new File(rootProject.projectDir, "local.properties")
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withInputStream { properties.load(it) }
        }
        def flutterSdkPathValue = properties.getProperty("flutter.sdk")
        if (flutterSdkPathValue) return flutterSdkPathValue
        // Fallback to FLUTTER_ROOT env var (set by GitHub Actions flutter-action)
        return System.getenv("FLUTTER_ROOT") ?: System.getenv("FLUTTER_HOME")
    }()
    assert flutterSdkPath != null, "Flutter SDK path not found. Set flutter.sdk in local.properties or FLUTTER_ROOT env var."
    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.3.2" apply false
    id "org.jetbrains.kotlin.android" version "1.9.22" apply false
}

include ":app"
