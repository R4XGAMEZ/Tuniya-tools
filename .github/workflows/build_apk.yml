name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Fix dependencies
        run: |
          sed -i 's/pdfx:.*/pdfx: 2.6.0/' pubspec.yaml
          sed -i 's/ffmpeg_kit_flutter_min:.*/ffmpeg_kit_flutter_new: ^4.1.0/' pubspec.yaml
          sed -i 's/image_cropper:.*/image_cropper: ^5.0.1/' pubspec.yaml
          sed -i 's/open_file:.*/open_file: ^3.3.2/' pubspec.yaml

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: TUNIYA-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
